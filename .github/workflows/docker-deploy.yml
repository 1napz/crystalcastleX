name: CI/CD Docker Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Python (optional: run tests)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pytest || echo "⚠️ Tests skipped"

      # 3. Build Docker image
      - name: Build Docker image
        run: docker build -t flask-pdf-api .

      # 4. Login to Docker Registry (DockerHub หรือ GHCR)
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Push Docker image
      - name: Push Docker image
        run: |
          docker tag flask-pdf-api ${{ secrets.DOCKER_USERNAME }}/flask-pdf-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-pdf-api:latest

      # 6. Deploy (ตัวอย่าง: SSH ไปเซิร์ฟเวอร์)
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/flask-pdf-api:latest
            docker stop flask-pdf-api || true
            docker rm flask-pdf-api || true
            docker run -d -p 8000:8000 \
              -v /opt/keys/service_account.json:/app/service_account.json \
              -e GOOGLE_APPLICATION_CREDENTIALS=/app/service_account.json \
              --name flask-pdf-api \
              ${{ secrets.DOCKER_USERNAME }}/flask-pdf-api:latest
