name: Log Summary

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  actions: read

concurrency:
  group: log-summary
  cancel-in-progress: false

jobs:
  summarize:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Replace with API-based download if using workflow_run artifacts
      - name: Download logs
        uses: actions/download-artifact@v4
        with:
          name: workflow-logs
          path: logs/
        continue-on-error: true

      - name: Generate summary
        run: node scripts/summarize-log.js

      - name: Commit changes
        run: |
          git config user.name "summary-bot"
          git config user.email "bot@users.noreply.github.com"

          git add update/

          git diff --cached --quiet && exit 0

          git commit -m "📝 log summary (${GITHUB_RUN_ID})"

      - name: Push changes
        run: git push origin HEAD:${{ github.event.repository.default_branch }}