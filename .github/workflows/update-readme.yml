name: Update README from docs/knowledge

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/knowledge/**' # รันเมื่อไฟล์ในนี้เปลี่ยน
      - 'scripts/update_readme.py'
  workflow_dispatch: # กดรันเองได้
  schedule:
    - cron: '0 0 * * *' # รันทุกวันเผื่อไว้

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install pyyaml

      - name: Update README
        run: python scripts/update_readme.py

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --cached --quiet || git commit -m "docs: auto sync knowledge to README"
          git push