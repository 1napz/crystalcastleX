name: Generate Content

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup R
      uses: r-lib/actions/setup-r@v2

    - name: Install dependencies
      run: |
        Rscript -e "install.packages('rmarkdown')"

    - name: Run script
      run: |
        Rscript generate.R

    - name: Upload output
      uses: actions/upload-artifact@v4
      with:
        name: html-output
        path: "*.html"