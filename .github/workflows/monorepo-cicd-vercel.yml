name: Monorepo CI/CD with Vercel Remote Cache

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}   # move out of hardcode

jobs:
  ci:
    name: Build & Test / ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false           # other apps still run if one fails
      matrix:
        app: [web, docs, admin]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2         # turbo needs HEAD^ for change detection

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci              # faster + strict lockfile in CI

      - name: Lint
        run: npx turbo run lint --filter=apps/${{ matrix.app }}

      - name: Build
        run: npx turbo run build --filter=apps/${{ matrix.app }}

      - name: Test
        run: npx turbo run test --filter=apps/${{ matrix.app }}

  deploy:
    name: Deploy → Vercel Production
    runs-on: ubuntu-latest
    needs: ci
    # Only deploy merged commits to main, never on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          npx vercel \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --prod \
            --yes            # replaces deprecated --confirm
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}