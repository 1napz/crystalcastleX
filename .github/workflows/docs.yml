name: Docs Workflow

on:
  push:
    branches:
      - main

jobs:
  docs-validate:
    if: contains(github.event.head_commit.message, 'docs')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Docs Validation
        run: python scripts/jobs/docs/docs_validate.py