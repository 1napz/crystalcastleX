name: Gitignore Guard

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-gitignore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate .gitignore
        run: |
          REQUIRED_PATTERNS=("service_account.json" ".env" "__pycache__/" "*.pyc" "venv/" "env/" ".venv/")
          for pattern in "${REQUIRED_PATTERNS[@]}"; do
            if ! grep -q "$pattern" .gitignore; then
              echo "❌ Missing pattern in .gitignore: $pattern"
              exit 1
            fi
          done
          echo "✅ .gitignore covers required patterns"