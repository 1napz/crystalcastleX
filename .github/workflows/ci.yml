name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  pull-requests: write
  contents: read # ลดจาก write เหลือ read พอแล้ว ปลอดภัยกว่า

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Smoke Tests
        run: |
          mkdir -p tests/ai/results
          pytest tests/test_smoke_generation.py --junitxml=tests/ai/results/smoke-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-results
          path: tests/ai/results/
          if-no-files-found: ignore

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # ดักบั๊ก #744: เช็คว่า bundle ไม่มี import พัง
      - name: Verify build artifact
        run: |
          if grep -R "Cannot find module" dist/ || grep -R "undefined" dist/; then
            echo "::error::Build artifact contains broken imports. Check your bundler config."
            exit 1
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Job R ที่ยุบมาจาก Generate Content.yml
  r-content:
    runs-on: ubuntu-latest
    # รันเฉพาะตอนไฟล์ R เปลี่ยนเท่านั้น ประหยัด minutes
    if: |
      github.event_name == 'push' &&
      (contains(github.event.head_commit.modified, '.R') || contains(github.event.head_commit.added, '.R') || contains(github.event.head_commit.modified, '.Rmd'))
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: rmarkdown
          cache-version: 2
      - run: Rscript generate.R
      - uses: actions/upload-artifact@v4
        with:
          name: html-output
          path: "*.html"

  pr-description:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr.body || pr.body.trim() === "") {
              const commits = await github.rest.pulls.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });
              const commitList = commits.data.map(c => `- ${c.commit.message.split("\n")[0]}`).join("\n");
              const template = `
## 🚀 Pull Request
### 📌 Summary / สรุป
- EN: Auto-generated summary based on commit history
- TH: สรุปอัตโนมัติจาก commit
---
### 🔄 Changes (Commits)
${commitList}
---
### ✅ Pre-Merge Checklist
- [ ] Feature works as expected
- [ ] Tests added/updated
- [ ] Docs updated
- [ ] AI cost validated
---
### 🔎 Issue Reference
- Related: #<issue-number>
---
### 📝 Notes
workflow merged from crystalcastle/workflows to.github/workflows
              `;
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                body: template
              });
            }

  # Auto Approve & Auto Merge แบบปลอดภัย
  auto-pilot:
    runs-on: ubuntu-latest
    # เงื่อนไขใหม่: ต้องติด label 'auto-merge' และไม่ใช่ PR จาก fork
    if: |
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'auto-merge') &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: [build, ai-test]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Auto Approve PR
        run: gh pr review ${{ github.event.pull_request.number }} --approve --body "🤖 System CI/CD: All checks passed. Auto-approving this PR."
      - name: Enable Auto Merge
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto --body "🤖 System CI/CD: Automated merge after successful test suite."