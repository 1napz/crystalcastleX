version: "3.9"
services:
  backend:
    build: ./src/backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  frontend:
    build: ./src/frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000

  ai-worker:
    image: ollama/llama3:8b
    deploy:
      replicas: 3
    environment:
      - MODEL_PATH=/models/llama3-8b
    volumes:
      - ./models:/models

  db:
    image: postgres:15
    ports:
      - "6543:5432"
    environment:
      - POSTGRES_USER=crystal
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=crystalcastle

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
